spring:
  application:
    name: mobi-agent-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mobi_agent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
